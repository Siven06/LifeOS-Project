services:
  mysql:
    image: mysql:8.0
    container_name: lifeos-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-lifeos}
      MYSQL_USER: ${MYSQL_USER:-lifeos}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-lifeos123}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lifeos-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: mysql
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-lifeos}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-lifeos}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-lifeos123}
      LIFEOS_JWT_SECRET: ${JWT_SECRET:-58656c694f7346696e466c6f775365637265744b6579466f724a57545369676e696e675573696e674853323536}
      LIFEOS_JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
