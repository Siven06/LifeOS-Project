<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>LifeOS - Personal Finance</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/styles.css"/>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            background: "#0A0A0B",
            surface: "#131314",
            "surface-dim": "#131314",
            "surface-bright": "#3a393a",
            "surface-container": "#201f20",
            "surface-container-low": "#1c1b1c",
            "surface-container-high": "#2a2a2b",
            "surface-container-highest": "#353436",
            "surface-container-lowest": "#0e0e0f",
            "on-surface": "#e5e2e3",
            "on-surface-variant": "#b9caca",
            primary: "#e9feff",
            "primary-container": "#00f5ff",
            "on-primary": "#003739",
            "on-primary-container": "#006c71",
            "primary-fixed": "#63f7ff",
            "primary-fixed-dim": "#00dce5",
            secondary: "#d1bcff",
            "secondary-container": "#7000ff",
            "on-secondary": "#3c0090",
            "on-secondary-container": "#ddcdff",
            tertiary: "#ecffea",
            "tertiary-container": "#3bfc89",
            "tertiary-fixed-dim": "#00e475",
            "on-tertiary": "#003918",
            error: "#ffb4ab",
            "error-container": "#93000a",
            outline: "#849495",
            "outline-variant": "#3a494a",
            "surface-tint": "#00dce5"
          },
          borderRadius: {
            DEFAULT: "0.25rem",
            lg: "0.5rem",
            xl: "0.75rem",
            "2xl": "1rem",
            full: "9999px"
          },
          fontFamily: {
            sans: ["Inter", "sans-serif"],
            display: ["Inter", "sans-serif"],
            "numerical-lg": ["Inter", "sans-serif"]
          },
          fontSize: {
            display: ["48px", { lineHeight: "56px", letterSpacing: "-0.02em", fontWeight: "700" }],
            "headline-lg": ["32px", { lineHeight: "40px", letterSpacing: "-0.01em", fontWeight: "600" }],
            "headline-md": ["24px", { lineHeight: "32px", fontWeight: "600" }],
            "body-lg": ["18px", { lineHeight: "28px", fontWeight: "400" }],
            "body-md": ["16px", { lineHeight: "24px", fontWeight: "400" }],
            "label-md": ["14px", { lineHeight: "20px", letterSpacing: "0.01em", fontWeight: "500" }],
            "label-sm": ["12px", { lineHeight: "16px", letterSpacing: "0.05em", fontWeight: "600" }],
            "numerical-lg": ["32px", { lineHeight: "40px", letterSpacing: "-0.02em", fontWeight: "700" }]
          }
        }
      }
    }
  </script>
</head>
<body class="bg-background text-on-surface min-h-screen font-sans">
  <div id="app"></div>
  <script src="js/utils.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/api.js"></script>
  <script src="js/components/toast.js"></script>
  <script src="js/components/transactionModal.js"></script>
  <script src="js/router.js"></script>
  <script src="js/screens/auth.js"></script>
  <script src="js/screens/dashboard.js"></script>
  <script src="js/screens/transactions.js"></script>
  <script src="js/screens/budgets.js"></script>
  <script src="js/screens/goals.js"></script>
  <script src="js/screens/alerts.js"></script>
  <script src="js/screens/profile.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
