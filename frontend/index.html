<!DOCTYPE html>
<html class="dark" lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" id="meta-theme-color" content="#0A0A0B" />
  <title>LifeOS - Finanzas Personales</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="LifeOS" />
  <link rel="apple-touch-icon" href="images/logo_lifeos.png" />
  
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@400&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/styles.css"/>
  
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            background: "rgb(var(--color-background))",
            surface: "rgb(var(--color-surface))",
            "surface-dim": "rgb(var(--color-surface-dim))",
            "surface-bright": "rgb(var(--color-surface-bright))",
            "surface-container": "rgb(var(--color-surface-container))",
            "surface-container-low": "rgb(var(--color-surface-container-low))",
            "surface-container-high": "rgb(var(--color-surface-container-high))",
            "surface-container-highest": "rgb(var(--color-surface-container-highest))",
            "surface-container-lowest": "rgb(var(--color-surface-container-lowest))",
            "on-surface": "rgb(var(--color-on-surface))",
            "on-surface-variant": "rgb(var(--color-on-surface-variant))",
            primary: "rgb(var(--color-primary))",
            "primary-container": "rgb(var(--color-primary-container))",
            "on-primary": "rgb(var(--color-on-primary))",
            "on-primary-container": "rgb(var(--color-on-primary-container))",
            "primary-fixed": "rgb(var(--color-primary-fixed))",
            "primary-fixed-dim": "rgb(var(--color-primary-fixed-dim))",
            secondary: "rgb(var(--color-secondary))",
            "secondary-container": "rgb(var(--color-secondary-container))",
            "on-secondary": "rgb(var(--color-on-secondary))",
            "on-secondary-container": "rgb(var(--color-on-secondary-container))",
            tertiary: "rgb(var(--color-tertiary))",
            "tertiary-container": "rgb(var(--color-tertiary-container))",
            "tertiary-fixed-dim": "rgb(var(--color-tertiary-fixed-dim))",
            "on-tertiary": "rgb(var(--color-on-tertiary))",
            success: "rgb(var(--color-success))",
            "success-container": "rgb(var(--color-success-container))",
            danger: "rgb(var(--color-danger))",
            "danger-container": "rgb(var(--color-danger-container))",
            error: "rgb(var(--color-error))",
            "error-container": "rgb(var(--color-error-container))",
            outline: "rgb(var(--color-outline))",
            "outline-variant": "rgb(var(--color-outline-variant))",
            "surface-tint": "rgb(var(--color-surface-tint))"
          },
          borderRadius: {
            DEFAULT: "8px",
            lg: "12px",
            xl: "16px",
            "2xl": "24px",
            full: "9999px"
          },
          fontFamily: {
            sans: ["Inter", "system-ui", "sans-serif"],
            mono: ["JetBrains Mono", "SF Mono", "monospace"],
            display: ["Inter", "sans-serif"],
            "numerical-lg": ["JetBrains Mono", "monospace"]
          },
          fontSize: {
            display: ["40px", { lineHeight: "48px", letterSpacing: "-0.02em", fontWeight: "700" }],
            "headline-lg": ["32px", { lineHeight: "40px", letterSpacing: "-0.01em", fontWeight: "600" }],
            "headline-md": ["24px", { lineHeight: "32px", fontWeight: "600" }],
            "body-lg": ["18px", { lineHeight: "28px", fontWeight: "400" }],
            "body-md": ["16px", { lineHeight: "24px", fontWeight: "400" }],
            "label-md": ["14px", { lineHeight: "20px", letterSpacing: "0.01em", fontWeight: "500" }],
            "label-sm": ["12px", { lineHeight: "16px", letterSpacing: "0.05em", fontWeight: "600" }],
            "numerical-lg": ["36px", { lineHeight: "44px", letterSpacing: "-0.02em", fontWeight: "700", fontVariantNumeric: "tabular-nums" }],
            "numerical-md": ["24px", { lineHeight: "32px", letterSpacing: "-0.02em", fontWeight: "700", fontVariantNumeric: "tabular-nums" }]
          },
          boxShadow: {
            'card': '0 1px 3px rgba(0,0,0,0.3), inset 0 0 0 1px rgba(255,255,255,0.05)',
            'elevated': '0 8px 24px rgba(0,0,0,0.4), inset 0 0 0 1px rgba(255,255,255,0.05)',
            'glow': '0 0 20px rgba(0,184,212,0.3)'
          }
        }
      }
    }
  </script>
</head>
<body class="bg-background text-on-surface min-h-screen font-sans antialiased">
  <div id="app"></div>
  
  <script src="js/utils.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/api.js"></script>
  <script src="js/components/toast.js"></script>
  <script src="js/components/transactionModal.js"></script>
  <script src="js/router.js"></script>
  <script src="js/screens/auth.js"></script>
  <script src="js/screens/dashboard.js"></script>
  <script src="js/screens/transactions.js"></script>
  <script src="js/screens/budgets.js"></script>
  <script src="js/screens/goals.js"></script>
  <script src="js/screens/debts.js"></script>
  <script src="js/screens/alerts.js"></script>
  <script src="js/screens/profile.js"></script>
  <script src="js/app.js"></script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(reg => console.log('[SW] Registered:', reg.scope))
          .catch(err => console.log('[SW] Registration failed:', err));
      });
    }
  </script>
</body>
</html>
